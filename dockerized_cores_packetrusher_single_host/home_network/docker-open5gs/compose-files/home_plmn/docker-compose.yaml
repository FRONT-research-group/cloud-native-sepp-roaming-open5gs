services:
  h-db:
    container_name: h-db
    image: "mongo:${MONGODB_VERSION}"
    command: "mongod --bind_ip 0.0.0.0 --port 27017"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.2
        aliases:
          - db.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - db_data:/data/db
      - db_config:/data/configdb
    ports:
      - "0.0.0.0:27017:27017/tcp"

  h-nrf:
    container_name: h-nrf
    image: "nrf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/nrf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/nrf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.3
        aliases:
          - nrf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: nrf_config
        target: /etc/open5gs/custom/nrf.yaml
    ports:
      - "0.0.0.0:8180:80"

  h-ausf:
    container_name: h-ausf
    image: "ausf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/ausf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/ausf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.4
        aliases:
          - ausf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: ausf_config
        target: /etc/open5gs/custom/ausf.yaml
    depends_on:
      - h-nrf
    ports:
      - "0.0.0.0:8089:80"

  h-udm:
    container_name: h-udm
    image: "udm:${OPEN5GS_VERSION}"
    build:
      context: ../../images/udm
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/udm.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.5
        aliases:
          - udm.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: udm_config
        target: /etc/open5gs/custom/udm.yaml
    depends_on:
      - h-nrf
    ports:
      - "0.0.0.0:8182:80"

  h-udr:
    container_name: h-udr
    image: "udr:${OPEN5GS_VERSION}"
    build:
      context: ../../images/udr
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/udr.yaml"
    restart: unless-stopped
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.6
        aliases:
          - udr.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: udr_config
        target: /etc/open5gs/custom/udr.yaml
    depends_on:
      - h-db
      - h-nrf
    ports:
      - "0.0.0.0:8183:80"

  h-nssf:
    container_name: h-nssf
    image: "nssf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/nssf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/nssf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.7
        aliases:
          - nssf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: nssf_config
        target: /etc/open5gs/custom/nssf.yaml
    depends_on:
      - h-nrf
    ports:
      - "0.0.0.0:8184:80"

  h-bsf:
    container_name: h-bsf
    image: "bsf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/bsf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/bsf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.8
        aliases:
          - bsf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: bsf_config
        target: /etc/open5gs/custom/bsf.yaml
    depends_on:
      - h-nrf
    ports:
      - "0.0.0.0:8085:80"

  h-pcf:
    container_name: h-pcf
    image: "pcf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/pcf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/pcf.yaml"
    restart: unless-stopped
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.9
        aliases:
          - pcf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: pcf_config
        target: /etc/open5gs/custom/pcf.yaml
    depends_on:
      - h-db
      - h-nrf
    ports:
      - "0.0.0.0:8086:80"
      - "0.0.0.0:9092:9090"

  h-amf:
    container_name: h-amf
    image: "amf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/amf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/amf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.10
        aliases:
          - amf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: amf_config
        target: /etc/open5gs/custom/amf.yaml
    depends_on:
      - h-nrf
    ports:
      - "0.0.0.0:38412:38412/sctp"
      - "0.0.0.0:8087:80"
      - "0.0.0.0:9093:9090"

  h-smf:
    container_name: h-smf
    image: "smf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/smf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/smf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.11
        aliases:
          - smf.5gc.mnc001.mcc001.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: smf_config
        target: /etc/open5gs/custom/smf.yaml
    depends_on:
      - h-nrf
      - h-upf
    ports:
      - "0.0.0.0:8088:80"
      - "0.0.0.0:9095:9090"

  h-upf:
    container_name: h-upf
    image: "upf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/upf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/upf.yaml"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.12
        aliases:
          - upf.5gc.mnc001.mcc001.3gppnetwork.org
    extra_hosts:
      docker-host.external-ip: ${DOCKER_HOST_IP}
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: upf_config
        target: /etc/open5gs/custom/upf.yaml
    privileged: true
    cap_add:
      - NET_ADMIN
    ports:
      - "0.0.0.0:6152:2152/udp"
      # - "0.0.0.0:9099:9090"
      - "0.0.0.0:9094:9090"

  h-sepp:
    container_name: h-sepp
    image: "sepp:${OPEN5GS_VERSION}"
    build:
      context: ../../images/sepp
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/sepp.yaml"
    restart: unless-stopped
    volumes:
      - ../../logs:/var/log/open5gs
    extra_hosts:
      - "sepp-n32.5gc.mnc070.mcc999.3gppnetwork.org:10.10.30.3"
    networks:
      o5gs_interconnect_net:
        ipv4_address: 10.10.30.2
        aliases:
          - sepp-n32.5gc.mnc001.mcc001.3gppnetwork.org
      o5gs_h_net:
        ipv4_address: 10.10.10.13
        aliases:
          - sepp.5gc.mnc001.mcc001.3gppnetwork.org
    configs:
      - source: sepp_config
        target: /etc/open5gs/custom/sepp.yaml
    depends_on:
      - h-nrf  

  h-prometheus:
    container_name: h-prometheus
    image: "prom/prometheus:v2.51.0"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.14
        aliases:
          - metrics.prometheus.5gc.mnc001.mcc001.3gppnetwork.org
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "0.0.0.0:9090:9090/tcp"
    depends_on:
      - h-amf
      - h-pcf
      - h-smf
      - h-upf

  h-grafana:
    container_name: h-grafana
    image: "grafana/grafana-oss:10.4.0"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.15
        aliases:
          - dashboard.grafana.5gc.mnc001.mcc001.3gppnetwork.org
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/open5gs_prometheus.yaml
      - source: grafana_dashboard_provider
        target: /etc/grafana/provisioning/dashboards/open5gs_metrics.yaml
    volumes:
      - ../../configs/home_plmn/home_network/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    ports:
      - "0.0.0.0:3000:3000/tcp"
    depends_on:
      - h-prometheus

  h-webui:
    container_name: h-webui
    image: "webui:${OPEN5GS_VERSION}"
    build:
      context: ../../images/webui
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - NODE_VERSION=${NODE_VERSION}
    environment:
      - DB_URI=mongodb://db.5gc.mnc001.mcc001.3gppnetwork.org/open5gs
      - PORT=9999
      - HOSTNAME=0.0.0.0
      - NODE_ENV=dev
    command: "run dev"
    networks:
      o5gs_h_net:
        ipv4_address: 10.10.10.16
        aliases:
          - webui.5gc.mnc001.mcc001.3gppnetwork.org
    depends_on:
      - h-db
    ports:
      - "0.0.0.0:9999:9999/tcp"

networks:
  o5gs_interconnect_net:
    external: true
  o5gs_h_net:
    name: o5gs_h_net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-o5gs_h_net
    ipam:
      config:
        - subnet: 10.10.10.0/24

volumes:
  db_data:
    name: open5gs_db_data
    labels:
      org.open5gs.mongodb_version: ${MONGODB_VERSION}
  db_config:
    name: open5gs_db_config
    labels:
      org.open5gs.mongodb_version: ${MONGODB_VERSION}
  prometheus_data:
    name: open5gs_prometheus_data

configs:
  nrf_config:
    file: ../../configs/home_plmn/home_network/nrf.yaml
  ausf_config:
    file: ../../configs/home_plmn/home_network/ausf.yaml
  udm_config:
    file: ../../configs/home_plmn/home_network/udm.yaml
  udr_config:
    file: ../../configs/home_plmn/home_network/udr.yaml
  nssf_config:
    file: ../../configs/home_plmn/home_network/nssf.yaml
  bsf_config:
    file: ../../configs/home_plmn/home_network/bsf.yaml
  pcf_config:
    file: ../../configs/home_plmn/home_network/pcf.yaml
  amf_config:
    file: ../../configs/home_plmn/home_network/amf.yaml
  smf_config:
    file: ../../configs/home_plmn/home_network/smf.yaml
  upf_config:
    file: ../../configs/home_plmn/home_network/upf.yaml
  prometheus_config:
    file: ../../configs/home_plmn/home_network/prometheus.yml
  grafana_datasource:
    file: ../../configs/home_plmn/home_network/grafana/datasource.yaml
  grafana_dashboard_provider:
    file: ../../configs/home_plmn/home_network/grafana/dashboard_provider.yaml
  sepp_config:
    file: ../../configs/home_plmn/home_network/sepp.yaml
