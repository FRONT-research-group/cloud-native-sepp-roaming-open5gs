logger:
  file:
    path: /var/log/open5gs/amf.log
  level: debug

global:
#home amf is not used in LBO roaming scenario
amf:
  sbi:
    server:
      - address: amf.5gc.mnc001.mcc001.3gppnetwork.org
        port: 80
    client:
      nrf:
        - uri: http://nrf.5gc.mnc001.mcc001.3gppnetwork.org:80
  ngap:
    server:
      - address: amf.5gc.mnc001.mcc001.3gppnetwork.org
  metrics:
    server:
      - address: amf.5gc.mnc001.mcc001.3gppnetwork.org
        port: 9090
  guami:
    - plmn_id:
        mcc: 001
        mnc: 01
      amf_id:
        region: 2
        set: 1
  tai:
    - plmn_id:
        mcc: 001
        mnc: 01
      tac: 1
  plmn_support:
    - plmn_id:
        mcc: 001
        mnc: 01
      s_nssai:
        - sst: 1
          # sd: 1
          #- sst: 1
          #sd: 2
          #- sst: 1
          #sd: 3
  security:
      integrity_order : [ NIA2, NIA1, NIA0 ]
      ciphering_order : [ NEA0, NEA1, NEA2 ]
  network_name:
    full: o5gs_h_net
  amf_name: o5gs_h_net-amf0
  time:
    t3512:
      value: 540
