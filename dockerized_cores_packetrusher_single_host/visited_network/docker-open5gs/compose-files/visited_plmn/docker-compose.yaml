services:
  v-db:
    container_name: v-db
    image: "mongo:${MONGODB_VERSION}"
    command: "mongod --bind_ip 0.0.0.0 --port 27017"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.2
        aliases:
          - db.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - db_data:/data/db
      - db_config:/data/configdb
    ports:
      - "0.0.0.0:27018:27017/tcp"

  v-nrf:
    container_name: v-nrf
    image: "nrf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/nrf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/nrf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.3
        aliases:
          - nrf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: nrf_config
        target: /etc/open5gs/custom/nrf.yaml
    ports:
      - "0.0.0.0:7180:80"

  v-ausf:
    container_name: v-ausf
    image: "ausf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/ausf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/ausf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.4
        aliases:
          - ausf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: ausf_config
        target: /etc/open5gs/custom/ausf.yaml
    depends_on:
      - v-nrf
    ports:
      - "0.0.0.0:7089:80"

  v-udm:
    container_name: v-udm
    image: "udm:${OPEN5GS_VERSION}"
    build:
      context: ../../images/udm
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/udm.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.5
        aliases:
          - udm.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: udm_config
        target: /etc/open5gs/custom/udm.yaml
    depends_on:
      - v-nrf
    ports:
      - "0.0.0.0:7182:80"

  v-udr:
    container_name: v-udr
    image: "udr:${OPEN5GS_VERSION}"
    build:
      context: ../../images/udr
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/udr.yaml"
    restart: unless-stopped
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.6
        aliases:
          - udr.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: udr_config
        target: /etc/open5gs/custom/udr.yaml
    depends_on:
      - v-db
      - v-nrf
    ports:
      - "0.0.0.0:7183:80"

  v-nssf:
    container_name: v-nssf
    image: "nssf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/nssf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/nssf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.7
        aliases:
          - nssf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: nssf_config
        target: /etc/open5gs/custom/nssf.yaml
    depends_on:
      - v-nrf
    ports:
      - "0.0.0.0:7184:80"

  v-bsf:
    container_name: v-bsf
    image: "bsf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/bsf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/bsf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.8
        aliases:
          - bsf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: bsf_config
        target: /etc/open5gs/custom/bsf.yaml
    depends_on:
      - v-nrf
    ports:
      - "0.0.0.0:7085:80"

  v-pcf:
    container_name: v-pcf
    image: "pcf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/pcf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/pcf.yaml"
    restart: unless-stopped
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.9
        aliases:
          - pcf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: pcf_config
        target: /etc/open5gs/custom/pcf.yaml
    depends_on:
      - v-db
      - v-nrf
    ports:
      - "0.0.0.0:7086:80"
      - "0.0.0.0:7092:9090"

  v-amf:
    container_name: v-amf
    image: "amf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/amf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/amf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.10
        aliases:
          - amf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: amf_config
        target: /etc/open5gs/custom/amf.yaml
    depends_on:
      - v-nrf
    ports:
      - "0.0.0.0:38413:38412/sctp"
      - "0.0.0.0:7087:80"
      - "0.0.0.0:7093:9090"

  v-smf:
    container_name: v-smf
    image: "smf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/smf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/smf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.11
        aliases:
          - smf.5gc.mnc070.mcc999.3gppnetwork.org
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: smf_config
        target: /etc/open5gs/custom/smf.yaml
    depends_on:
      - v-nrf
      - v-upf
    ports:
      - "0.0.0.0:7088:80"
      - "0.0.0.0:7095:9090"

  v-upf:
    container_name: v-upf
    image: "upf:${OPEN5GS_VERSION}"
    build:
      context: ../../images/upf
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/upf.yaml"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.12
        aliases:
          - upf.5gc.mnc070.mcc999.3gppnetwork.org
    extra_hosts:
      docker-host.external-ip: ${DOCKER_HOST_IP}
    volumes:
      - ../../logs:/var/log/open5gs
    configs:
      - source: upf_config
        target: /etc/open5gs/custom/upf.yaml
    privileged: true
    cap_add:
      - NET_ADMIN
    ports:
      - "0.0.0.0:7152:2152/udp"
      # - "0.0.0.0:9099:9090"
      - "0.0.0.0:7094:9090"

  v-sepp:
    container_name: v-sepp
    image: "sepp:${OPEN5GS_VERSION}"
    build:
      context: ../../images/sepp
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - UBUNTU_VERSION=${UBUNTU_VERSION}
    command: "-c /etc/open5gs/custom/sepp.yaml"
    restart: unless-stopped
    volumes:
      - ../../logs:/var/log/open5gs
    extra_hosts:
      - "sepp-n32.5gc.mnc001.mcc001.3gppnetwork.org:10.10.30.2"
    networks:
      o5gs_interconnect_net:
        ipv4_address: 10.10.30.3
        aliases:
          - sepp-n32.5gc.mnc070.mcc999.3gppnetwork.org
      o5gs_v_net:
        ipv4_address: 10.10.20.13
        aliases:
          - sepp.5gc.mnc070.mcc999.3gppnetwork.org
    configs:
      - source: sepp_config
        target: /etc/open5gs/custom/sepp.yaml
    depends_on:
      - v-nrf  

  v-prometheus:
    container_name: v-prometheus
    image: "prom/prometheus:v2.51.0"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.14
        aliases:
          - metrics.prometheus.5gc.mnc070.mcc999.3gppnetwork.org
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "0.0.0.0:6090:9090/tcp"
    depends_on:
      - v-amf
      - v-pcf
      - v-smf
      - v-upf

  v-grafana:
    container_name: v-grafana
    image: "grafana/grafana-oss:10.4.0"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.15
        aliases:
          - dashboard.grafana.5gc.mnc070.mcc999.3gppnetwork.org
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/open5gs_prometheus.yaml
      - source: grafana_dashboard_provider
        target: /etc/grafana/provisioning/dashboards/open5gs_metrics.yaml
    volumes:
      - ../../configs/visited_plmn/visited_network/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=grafana
    ports:
      - "0.0.0.0:6000:3000/tcp"
    depends_on:
      - v-prometheus

  v-webui:
    container_name: v-webui
    image: "webui:${OPEN5GS_VERSION}"
    build:
      context: ../../images/webui
      args:
        - OPEN5GS_VERSION=${OPEN5GS_VERSION}
        - NODE_VERSION=${NODE_VERSION}
    environment:
      - DB_URI=mongodb://db.5gc.mnc070.mcc999.3gppnetwork.org/open5gs
      - PORT=9999
      - HOSTNAME=0.0.0.0
      - NODE_ENV=dev
    command: "run dev"
    networks:
      o5gs_v_net:
        ipv4_address: 10.10.20.16
        aliases:
          - webui.5gc.mnc070.mcc999.3gppnetwork.org
    depends_on:
      - v-db
    ports:
      - "0.0.0.0:6999:9999/tcp"

networks:
  o5gs_interconnect_net:
    external: true
  o5gs_v_net:
    name: o5gs_v_net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-o5gs_v_net
    ipam:
      config:
        - subnet: 10.10.20.0/24

volumes:
  db_data:
    name: visited_open5gs_db_data
    labels:
      org.open5gs.mongodb_version: ${MONGODB_VERSION}
  db_config:
    name: visited_open5gs_db_config
    labels:
      org.open5gs.mongodb_version: ${MONGODB_VERSION}
  prometheus_data:
    name: visited_open5gs_prometheus_data

configs:
  nrf_config:
    file: ../../configs/visited_plmn/visited_network/nrf.yaml
  ausf_config:
    file: ../../configs/visited_plmn/visited_network/ausf.yaml
  udm_config:
    file: ../../configs/visited_plmn/visited_network/udm.yaml
  udr_config:
    file: ../../configs/visited_plmn/visited_network/udr.yaml
  nssf_config:
    file: ../../configs/visited_plmn/visited_network/nssf.yaml
  bsf_config:
    file: ../../configs/visited_plmn/visited_network/bsf.yaml
  pcf_config:
    file: ../../configs/visited_plmn/visited_network/pcf.yaml
  amf_config:
    file: ../../configs/visited_plmn/visited_network/amf.yaml
  smf_config:
    file: ../../configs/visited_plmn/visited_network/smf.yaml
  upf_config:
    file: ../../configs/visited_plmn/visited_network/upf.yaml
  prometheus_config:
    file: ../../configs/visited_plmn/visited_network/prometheus.yml
  grafana_datasource:
    file: ../../configs/visited_plmn/visited_network/grafana/datasource.yaml
  grafana_dashboard_provider:
    file: ../../configs/visited_plmn/visited_network/grafana/dashboard_provider.yaml
  sepp_config:
    file: ../../configs/visited_plmn/visited_network/sepp.yaml
